<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Panel - OMET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
        <!-- Mesin Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>
<body style="background-color: #f4f6f9;">

    <!-- Header Developer -->
    <header class="main-header dev-header">
        <div class="user-info-box">
            <span class="text-welcome" style="color: #ffd700;">Panel Kontrol</span>
            <h1 class="text-username" id="displayNama">System Admin</h1>
            <p class="text-jabatan" id="displayJabatan">Akses Penuh</p>
        </div>

        <div class="header-right" style="display: flex; flex-direction: column; align-items: flex-end;">
            <div class="brand-name" style="background: rgba(0,0,0,0.3); border: none;">DEV MODE</div>
            <div class="profile-circle" style="border-color: #e74c3c;">
                <img src="https://via.placeholder.com/150" id="profileImage" alt="Dev Foto">
            </div>
        </div>
    </header>

    <main class="dashboard-body">
        
        <!-- Kartu 1: Update Pengumuman -->
        <div class="dev-card">
            <h3><i class="fas fa-bullhorn"></i> Update Agenda / Info</h3>
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">Teks ini akan muncul di dashboard semua pengguna.</p>
            <textarea id="inputPengumuman" class="dev-input" rows="3" placeholder="Contoh: Rapat evaluasi ditunda menjadi hari Senin..."></textarea>
            <button class="btn-dev" onclick="updatePengumuman()">Pancarkan Pengumuman</button>
        </div>

        <!-- Kartu 2: Buat Akun Baru (Lokal) -->
        <div class="dev-card" style="border-top-color: #2980b9;">
            <h3 style="color: #2980b9;"><i class="fas fa-user-plus"></i> Tambah Pengurus Baru</h3>
            <input type="text" id="newUsername" class="dev-input" placeholder="Username (tanpa spasi, misal: budi02)">
            <input type="text" id="newPassword" class="dev-input" placeholder="Password">
            <input type="text" id="newNama" class="dev-input" placeholder="Nama Lengkap">
            <select id="newLevel" class="dev-input">
                <option value="user">Anggota Biasa (User)</option>
                <option value="admin">Pengurus Inti (Admin)</option>
            </select>
            <button class="btn-dev" style="background: #2980b9;" onclick="tambahPengguna()">Simpan Akun</button>
        </div>

        <!-- Kartu 3: System Tools -->
        <div class="dev-card" style="border-top-color: #2c3e50;">
            <h3 style="color: #2c3e50;"><i class="fas fa-tools"></i> System Tools</h3>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span style="font-size: 0.85rem; font-weight: bold;">Status Database Lokal:</span>
                <span style="background: #2ecc71; color: white; padding: 3px 10px; border-radius: 10px; font-size: 0.7rem;">AMAN</span>
            </div>
            <button class="btn-dev btn-danger" onclick="resetSistem()"><i class="fas fa-trash-alt"></i> Bersihkan Semua Data Cache</button>
        </div>

        <div style="height: 100px;"></div>
    </main>

    <!-- Navigasi Bawah Khusus Dev -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active" style="color: #c0392b;">
            <i class="fas fa-laptop-code" style="color: #c0392b;"></i>
            <span>Dev Panel</span>
        </a>
        <a href="#" class="nav-item" onclick="keluarSistem()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </a>
    </nav>

    <script>
               // 1. Cek Keamanan Ekstra
        const user = JSON.parse(sessionStorage.getItem('userActive'));
        if (!user || user.level !== 'developer') {
            alert("Akses Ilegal Terdeteksi!");
            window.location.href = 'index.html';
        }
        document.getElementById('displayNama').innerText = user.nama;

        // 2. KONFIGURASI FIREBASE ONLINE
        const firebaseConfig = {
  apiKey: "AIzaSyCPm0H4RblqErp9TK2BLHow3GhqOWjGnUM",
  authDomain: "metapp-2fe37.firebaseapp.com",
  databaseURL: "https://metapp-2fe37-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "metapp-2fe37",
  storageBucket: "metapp-2fe37.firebasestorage.app",
  messagingSenderId: "536752760062",
  appId: "1:536752760062:web:22fe03b60f5f861e67f1af",
  measurementId: "G-3DQBB1SSKP"
};
        
        // Nyalakan mesin Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 3. Fungsi Update Pengumuman ke Server Online
        function updatePengumuman() {
            const teksBaru = document.getElementById('inputPengumuman').value;
            if(teksBaru.trim() === "") {
                alert("Isi pengumuman terlebih dahulu!");
                return;
            }
            
            // Perintah untuk mengirim data ke awan (Firebase)
            database.ref('dashboard/pengumuman').set({
                isi: teksBaru,
                waktu: new Date().toLocaleString()
            }).then(() => {
                alert("Berhasil! Pengumuman online telah dipancarkan ke semua anggota.");
                document.getElementById('inputPengumuman').value = "";
            }).catch((error) => {
                alert("Gagal mengirim data: " + error);
            });
        }

    </script>
</body>
</html>
